# Postgres para desarrollo local. La app corre con `npm run dev` (fuera de compose).
services:
  db:
    image: postgres:16-alpine
    container_name: erp-you-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: erpyou
      POSTGRES_PASSWORD: erpyou
      POSTGRES_DB: erpyou
    ports:
      - "5432:5432"
    volumes:
      - erpyou_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erpyou -d erpyou"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  erpyou_pgdata:
